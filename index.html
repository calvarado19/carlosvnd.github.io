<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carlos Alvarado | VND IT Engineer</title>
  <meta name="description" content="Digital business card for Carlos Alvarado, VND IT Engineer.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Page background and centered card wrapper -->
  <main class="page-shell">
    <section class="business-card" aria-labelledby="card-title">
      <!-- Profile header -->
      <div class="card-header">
        <div class="avatar" aria-hidden="true">CA</div>
        <div>
          <p class="eyebrow">VND Technology Services</p>
          <h1 id="card-title">Carlos Alvarado</h1>
          <p class="title">VND IT Engineer</p>
        </div>
      </div>

      <!-- Primary contact details -->
      <div class="contact-panel">
        <div class="contact-row">
          <span class="label">Phone</span>
          <div class="contact-value">
            <a href="tel:+12105902734;ext=1008">210-590-2734 ext. 1008</a>
            <button class="copy-button" type="button" data-copy="210-590-2734 ext. 1008">
              Copy
            </button>
          </div>
        </div>

        <div class="contact-row">
          <span class="label">Email</span>
          <a href="mailto:carlos@vndx.com">carlos@vndx.com</a>
        </div>

        <div class="contact-row">
          <span class="label">Support</span>
          <a href="mailto:support@vndx.com">support@vndx.com</a>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="action-grid" aria-label="Contact actions">
        <a class="action-button primary" href="tel:+12105902734;ext=1008">Call Carlos</a>
        <a class="action-button" href="mailto:carlos@vndx.com">Email Carlos</a>
        <a class="action-button" href="mailto:support@vndx.com">Email Support</a>
      </div>

      <!-- Support note -->
      <p class="support-note">
        For technical support, please contact VND support or reach out to Carlos directly.
      </p>

      <p class="copy-status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
